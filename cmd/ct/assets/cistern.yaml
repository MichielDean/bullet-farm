# Cistern configuration
# Water is life. Code is water. The Cistern keeps it moving.
#
# Repos flow through aqueducts. Cataractae operators process droplets along the way.
# Work items are droplets. The cistern holds them until they flow free.

repos:
  - name: ScaledTest
    url: https://github.com/example/ScaledTest
    workflow_path: aqueduct/aqueduct.yaml
    cataractae: 2
    # Cataractae operator names — who processes the droplets
    names:
      - virgo
      - marcia
    prefix: st

  - name: cistern
    url: https://github.com/example/cistern
    workflow_path: aqueduct/aqueduct.yaml
    cataractae: 2
    names:
      - virgo
      - marcia
    prefix: ct

max_cataractae: 4
handoff_token_threshold: 100000

# heartbeat_interval controls how often the Castellarius scans for orphaned or
# stalled in-progress sessions and resets / re-adopts them. Accepts Go duration
# strings. Shorter values make recovery faster; longer values reduce overhead.
# Default: 30s
heartbeat_interval: 30s

# Drought protocols — run automatically when the Cistern is idle
drought_hooks:
  - name: sync-cataractae
    action: cataractae_generate # Regenerate role files when workflow YAML is newer

  - name: prune-worktrees
    action: worktree_prune # Prune stale aqueduct registrations


  # - name: vacuum-db
  #   action: db_vacuum     # Compact the cistern database

  # - name: custom
  #   action: shell
  #   command: "echo idle >> ~/.cistern/drought.log"
  #   timeout_seconds: 5


# External issue tracker integrations — configure tracker providers for droplet import
# trackers:
#   - name: jira
#     url: https://myorg.atlassian.net
#     email: user@example.com
#     token: api-token-here                    # Literal token (not recommended for production)
#     # OR use environment variable:
#     # token_env: JIRA_TOKEN                  # Reads from $JIRA_TOKEN at runtime
#
#   - name: linear
#     url: https://linear.app
#     token_env: LINEAR_TOKEN                  # Reads from $LINEAR_TOKEN at runtime

dashboard_font_family: 'Liberation Mono, DejaVu Sans Mono, Menlo, Consolas, monospace'

# trackers configures external issue tracker integrations for ct import.
# Each entry maps a provider name to its connection parameters.
# Usage: ct import jira PROJ-123 --repo myrepo
#
# trackers:
#   - name: jira
#     base_url: https://yourcompany.atlassian.net
#     token_env: JIRA_TOKEN       # env var holding your Jira API token
#     user_env: JIRA_USER         # env var holding your Jira username (email)
#     priority_map:               # optional: override default priority mapping
#       Highest: 1
#       High: 1
#       Medium: 2
#       Low: 3
#       Lowest: 3
