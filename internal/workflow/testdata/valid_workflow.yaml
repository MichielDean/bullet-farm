name: feature
steps:
  - name: implement
    type: agent
    role: implementer
    model: sonnet
    context: full_codebase
    max_iterations: 3
    timeout_minutes: 30
    on_pass: review
    on_fail: blocked

  - name: review
    type: agent
    role: reviewer
    model: sonnet
    context: diff_only
    on_pass: qa
    on_revision: implement
    on_escalate: human

  - name: qa
    type: agent
    role: qa
    model: haiku
    context: full_codebase
    on_pass: merge
    on_fail: implement

  - name: merge
    type: automated
    on_pass: done
    on_fail: human
